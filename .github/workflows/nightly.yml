# SPDX-License-Identifier: Apache-2.0
# Roamex nightly (roam-5 / §12.6): the full build + full suite once a capable runner exists
# (roam-36); until then the hermetic slice runs and the Chromium half skips VISIBLY.
name: nightly
on:
  schedule:
    - cron: "0 10 * * *"   # daily, 10:00 UTC
  workflow_dispatch:
permissions:
  contents: read
jobs:
  full-suite:
    # ROAMEX_CHROMIUM_DEPENDENT: nightly full Chromium build + suite (capability-gated).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Hermetic suite (always runs)
        run: python3 -m unittest discover -s roamex/build/tests -v
      - name: Gate (capability)
        id: gate
        env:
          CAP: ${{ vars.ROAMEX_CI_CHROMIUM_RUNNER }}
        run: |
          if [ -z "$CAP" ]; then
            echo "SKIPPED: full Chromium build needs the provisioned runner (roam-36 / I-0.6)." | tee -a "$GITHUB_STEP_SUMMARY"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Full Chromium build + suite
        if: steps.gate.outputs.enabled == 'true'
        run: |
          echo "::error::capability variable is set but the nightly build is not wired yet (roam-36)"
          exit 1
